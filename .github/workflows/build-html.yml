name: Build HTML

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tools/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-html.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-html:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build offline HTML
        run: npm run build

      - name: Commit built HTML if changed
        run: |
          if git diff --quiet -- "坦克大战.html"; then
            echo "No HTML build changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "坦克大战.html"
          git commit -m "Build updated tank battle html [skip ci]"
          git push
